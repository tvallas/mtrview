<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mtrview</title>
    <meta name="theme-color" content="#0d1117" />
    <meta name="apple-mobile-web-app-title" content="mtrview" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="{{ url_for('static', path='apple-touch-icon.png') }}"
    />
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
  </head>
  <body class="controls-collapsed">
    <header class="topbar">
      <div class="brand">
        <img
          class="brand-logo"
          src="{{ url_for('static', path='mtrview-logo.png') }}"
          alt="mtrview"
        />
        <h1>mtrview</h1>
      </div>
      <div class="header-metrics" aria-label="Summary">
        <article class="metric-tile summary-tile">
          <span>Sensors</span>
          <strong class="count-line">
            <b id="countTotal">0</b> total
            <b id="countOffline">0</b> offline
          </strong>
        </article>
        <article class="metric-tile status-tile connection-tile">
          <span>Status</span>
          <strong>
            <span id="refreshTime">now</span>
            <span id="mqttStatus">unknown</span>
          </strong>
        </article>
        <div class="view-toggle header-view-toggle" role="group" aria-label="View">
          <button id="tableViewButton" class="active" type="button">Table</button>
          <button id="cardViewButton" type="button">Cards</button>
        </div>
        <button
          id="controlsToggle"
          class="icon-button"
          type="button"
          aria-controls="controls"
          aria-expanded="false"
          title="Show filters"
        >
          Filters
        </button>
      </div>
    </header>

    <main>
      <section id="controls" class="controls" aria-label="Controls">
        <input id="searchInput" type="search" placeholder="Search sensors" />
        <select id="statusFilter" aria-label="Filter by status">
          <option value="all">All statuses</option>
          <option value="online">Online</option>
          <option value="problem">Offline</option>
        </select>
        <select id="zoneFilter" aria-label="Filter by zone">
          <option value="all">All zones</option>
        </select>
        <select id="receiverFilter" aria-label="Filter by receiver">
          <option value="all">All receivers</option>
        </select>
        <select id="sortSelect" aria-label="Sort sensors">
          <option value="location">Location</option>
          <option value="updated">Latest updated</option>
          <option value="battery">Battery</option>
          <option value="quantity">Quantity</option>
          <option value="value">Value</option>
          <option value="unit">Unit</option>
          <option value="zone">Zone</option>
          <option value="receiver">Receiver</option>
          <option value="transmitter_id">Transmitter</option>
        </select>
      </section>

      <section id="prioritySection" class="priority-section hidden">
        <h2>Needs attention</h2>
        <div id="priorityCards" class="card-grid"></div>
      </section>

      <section id="cardView" class="grouped-list hidden">
        <h2>All sensors</h2>
        <div id="sensorGroups"></div>
      </section>

      <section id="tableView" class="table-wrap">
        <table>
          <thead>
            <tr>
              <th aria-sort="ascending">
                <button class="sort-header active" type="button" data-sort="location">Sensor</button>
              </th>
              <th>
                <button class="sort-header" type="button" data-sort="value">Value</button>
              </th>
              <th>
                <button class="sort-header" type="button" data-sort="updated">Updated</button>
              </th>
              <th class="battery-column">
                <button class="sort-header" type="button" data-sort="battery">Battery</button>
              </th>
              <th class="optional-column">
                <button class="sort-header" type="button" data-sort="zone">Zone</button>
              </th>
              <th class="optional-column">
                <button class="sort-header" type="button" data-sort="receiver">Receiver</button>
              </th>
              <th class="optional-column">
                <button class="sort-header" type="button" data-sort="transmitter_id">
                  Transmitter
                </button>
              </th>
            </tr>
          </thead>
          <tbody id="sensorTable"></tbody>
        </table>
      </section>
    </main>

    <div id="sensorDetailOverlay" class="detail-overlay hidden" aria-hidden="true">
      <section
        class="detail-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="detailTitle"
      >
        <button id="detailClose" class="detail-close" type="button" aria-label="Close details">
          &times;
        </button>
        <div id="sensorDetail"></div>
      </section>
    </div>

    <script>
      window.MTRVIEW_INITIAL_DATA = {{ snapshot | tojson }};
      window.MTRVIEW_REFRESH_INTERVAL = {{ settings.refresh_interval_seconds }};
    </script>
    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
