<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mtrview</title>
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>mtrview</h1>
        <p>Latest mtr2mqtt summaries from MQTT</p>
      </div>
      <div class="topbar-meta">
        <span id="refreshTime">Updated now</span>
        <span id="mqttStatus" class="pill">MQTT unknown</span>
      </div>
    </header>

    <main>
      <section class="summary-strip" aria-label="Summary">
        <article><span>Total</span><strong id="countTotal">0</strong></article>
        <article><span>Online</span><strong id="countOnline">0</strong></article>
        <article><span>Stale</span><strong id="countStale">0</strong></article>
        <article><span>Offline</span><strong id="countOffline">0</strong></article>
        <article><span>Receivers</span><strong id="countReceivers">0</strong></article>
      </section>

      <section class="controls" aria-label="Controls">
        <input id="searchInput" type="search" placeholder="Search sensors" />
        <select id="statusFilter" aria-label="Filter by status">
          <option value="all">All statuses</option>
          <option value="ok">OK</option>
          <option value="stale">Stale</option>
          <option value="offline">Offline</option>
        </select>
        <select id="zoneFilter" aria-label="Filter by zone">
          <option value="all">All zones</option>
        </select>
        <select id="receiverFilter" aria-label="Filter by receiver">
          <option value="all">All receivers</option>
        </select>
        <select id="sortSelect" aria-label="Sort sensors">
          <option value="status">Status first</option>
          <option value="location">Location</option>
          <option value="updated">Latest updated</option>
          <option value="quantity">Quantity</option>
        </select>
        <div class="view-toggle" role="group" aria-label="View">
          <button id="cardViewButton" class="active" type="button">Cards</button>
          <button id="tableViewButton" type="button">Table</button>
        </div>
      </section>

      <section id="prioritySection" class="priority-section">
        <h2>Needs attention</h2>
        <div id="priorityCards" class="card-grid"></div>
      </section>

      <section id="cardView" class="grouped-list">
        <h2>All sensors</h2>
        <div id="sensorGroups"></div>
      </section>

      <section id="tableView" class="table-wrap hidden">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Location</th>
              <th>Quantity</th>
              <th>Value</th>
              <th>Unit</th>
              <th>Updated</th>
              <th>Zone</th>
              <th>Receiver</th>
              <th>Transmitter</th>
            </tr>
          </thead>
          <tbody id="sensorTable"></tbody>
        </table>
      </section>
    </main>

    <script>
      window.MTRVIEW_INITIAL_DATA = {{ snapshot | tojson }};
      window.MTRVIEW_REFRESH_INTERVAL = {{ settings.refresh_interval_seconds }};
    </script>
    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
