<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Floorplan - mtrview</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" href="{{ url_for('static', path='favicon.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', path='app.css') }}?v={{ static_version }}" />
  </head>
  <body class="floorplan-direct-page">
    <main class="floorplan-direct-shell" aria-label="Fullscreen floorplan">
      <a class="floorplan-direct-link" href="/?view=floorplan">Dashboard</a>
      <section id="floorplanView" class="floorplan-view floorplan-direct-view" aria-label="Floorplan">
        <div
          id="floorplanStage"
          class="floorplan-stage floorplan-direct-stage"
          role="button"
          tabindex="0"
          aria-label="Toggle browser fullscreen"
        >
          <img id="floorplanImage" class="floorplan-image" src="/floorplan.svg" alt="Floorplan" />
          <svg id="floorplanOverlay" class="floorplan-overlay" aria-label="Temperature areas"></svg>
        </div>
      </section>
    </main>
    <script>
      window.MTRVIEW_REFRESH_INTERVAL = {{ settings.refresh_interval_seconds }};
    </script>
    <script src="{{ url_for('static', path='floorplan-shared.js') }}?v={{ static_version }}"></script>
    <script src="{{ url_for('static', path='floorplan-fullscreen.js') }}?v={{ static_version }}"></script>
  </body>
</html>
